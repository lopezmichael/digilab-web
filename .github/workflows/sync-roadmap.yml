name: Sync Roadmap from digilab-app

on:
  repository_dispatch:
    types: [roadmap-updated]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch ROADMAP.md and extract frontmatter
        run: |
          curl -sL "https://raw.githubusercontent.com/lopezmichael/digilab-app/main/ROADMAP.md" -o /tmp/ROADMAP.md
          sed -n '/^---$/,/^---$/p' /tmp/ROADMAP.md | sed '1d;$d' > src/data/roadmap.yaml

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/data/roadmap.yaml || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/roadmap.yaml
          git commit -m "chore: sync roadmap from digilab-app"
          git push
