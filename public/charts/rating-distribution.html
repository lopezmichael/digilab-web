<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rating Distribution Comparison</title>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/histogram-bellcurve.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: transparent;
        }
        #container {
            width: 100%;
            height: 100%;
            min-height: 400px;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <script>
        // Simulated old algorithm data (flat/uniform distribution)
        const oldData = [];
        for (let i = 0; i < 200; i++) {
            oldData.push(1245 + Math.random() * 515); // Range: 1245-1760
        }

        // Simulated new algorithm data (bell curve centered at 1500)
        const newData = [];
        for (let i = 0; i < 200; i++) {
            // Box-Muller transform for normal distribution
            const u1 = Math.random();
            const u2 = Math.random();
            const z = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
            newData.push(1500 + z * 50); // Mean 1500, SD ~50
        }

        Highcharts.chart('container', {
            chart: {
                backgroundColor: 'transparent',
                style: {
                    fontFamily: 'Inter, -apple-system, BlinkMacSystemFont, sans-serif'
                }
            },
            title: {
                text: 'Rating Distribution: Old vs New Algorithm',
                style: { color: '#0A3055', fontWeight: '600' }
            },
            subtitle: {
                text: 'New system produces a proper bell curve centered at 1500',
                style: { color: '#666' }
            },
            xAxis: [{
                title: { text: 'Player Rating' },
                alignTicks: false,
                min: 1200,
                max: 1800
            }, {
                title: { text: '' },
                alignTicks: false,
                opposite: true,
                visible: false
            }],
            yAxis: [{
                title: { text: 'Probability Density' }
            }, {
                title: { text: '' },
                opposite: true,
                visible: false
            }],
            tooltip: {
                enabled: true,
                headerFormat: '<b>{series.name}</b><br/>',
                pointFormat: 'Rating: {point.x:.0f}'
            },
            legend: {
                enabled: true,
                layout: 'horizontal',
                align: 'center',
                verticalAlign: 'bottom'
            },
            plotOptions: {
                bellcurve: {
                    intervals: 4,
                    pointsInInterval: 5
                }
            },
            series: [{
                name: 'Old Algorithm (Flat)',
                type: 'bellcurve',
                xAxis: 0,
                yAxis: 0,
                baseSeries: 2,
                zIndex: 1,
                color: 'rgba(220, 53, 69, 0.7)',
                enableMouseTracking: true
            }, {
                name: 'New Algorithm (Bell Curve)',
                type: 'bellcurve',
                xAxis: 0,
                yAxis: 0,
                baseSeries: 3,
                zIndex: 2,
                color: 'rgba(10, 48, 85, 0.8)',
                enableMouseTracking: true
            }, {
                name: 'Old Data',
                type: 'scatter',
                data: oldData,
                visible: false,
                showInLegend: false
            }, {
                name: 'New Data',
                type: 'scatter',
                data: newData,
                visible: false,
                showInLegend: false
            }],
            credits: {
                enabled: false
            }
        });
    </script>
</body>
</html>
